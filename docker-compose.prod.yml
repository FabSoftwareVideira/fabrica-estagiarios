name: fabrica-estagiarios

services:
  fabrica-estagiarios-db:
    container_name: fabrica-estagiarios-db
    image: postgres:16-alpine
    env_file: .env
    environment:
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - fabrica-estagiarios_prod_db:/var/lib/postgresql/data
    networks:
      - fabrica-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 3

  fabrica-estagiarios-web:
    container_name: fabrica-estagiarios-web
    build:
      context: .
      target: prod
      args:
        APP_VERSION: ${APP_VERSION:-latest}
        APP_ENV: production
    image: fabrica-estagiarios:${APP_VERSION}
    pull_policy: build
    # ports:
    #   - "9091:3000" # Escolha uma porta disponível no host. Estou usando 9091 para evitar conflitos comuns.
    depends_on:
      fabrica-estagiarios-db:
        condition: service_healthy
    env_file: .env
    environment:
      - APP_ENV=production
      - APP_VERSION=${APP_VERSION:-latest}
      - POSTGRES_HOST=fabrica-estagiarios-db
    labels:
      - org.opencontainers.image.version=${APP_VERSION:-latest}
    networks:
      - fabrica-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M

volumes:
  fabrica-estagiarios_prod_db:

networks:
  fabrica-network:
    external: true
